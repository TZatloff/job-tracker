services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: timzatloff
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: job_tracker
    ports: [ "5432:5432" ]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U timzatloff -d job_tracker" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports: [ "8000:8000" ]
    env_file: .env
    environment:
      DB_HOST: db
      DB_NAME: job_tracker
      DB_USER: timzatloff
    depends_on:
      db:
        condition: service_healthy

volumes:
    pgdata: